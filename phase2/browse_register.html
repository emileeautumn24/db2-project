<html lang="en">
<head>
    <title>Browse and Register for Classes</title>
</head>
<body>
    <h2>Browse and Register for Classes</h2>
    <form action="browse_register.php" method="POST">
        <table style="border: 0">
            <tr>
                <td>Student ID:</td>
                <td><input type="text" id="student" name="student_id"></td>
            </tr>
            <tr>
                <td>Course ID (For Enrolling):</td>
                <td><input type="text" id="course" name="course_id"></td>
            </tr>
            <tr>
                <td>Section ID (For Enrolling):</td>
                <td><input type="text" id="section" name="section_id"></td>
            </tr>
            <tr>
                <td>Year:</td>
                <td>
                    <input type="text" id="year" name="year_id"/>
                </td>
            </tr>
            <tr>
                <td>Semester:</td>
                <td>
                    <input type="radio" id="winter" name="semesterSelector" value="Winter"/>
                    <label for="winter">Winter</label>
                    <input type="radio" id="spring" name="semesterSelector" value="Spring"/>
                    <label for="spring">Spring</label>
                    <input type="radio" id="summer" name="semesterSelector" value="Summer"/>
                    <label for="summer">Summer</label>
                    <input type="radio" id="fall" name="semesterSelector" value="Fall"/>
                    <label for="fall">Fall</label>
                </td>
            </tr>
            <tr><td><br></td></tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="View Course Offerings" name="view_btn">
                </td>
            </tr>
                <tr>
                <td colspan="2">
                    <input type="submit" value="Enroll" name="enroll_btn">
                </td>
            </tr>
        </table>
    </form>

    <script>
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student_id');
    if (studentId) {
        const field = document.getElementById('student');
        field.value = studentId;
        field.readOnly = true; // prevent editing since it came from login
    }
    </script>

</body>
</html>
