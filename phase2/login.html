<html lang="en">
<head>
    <title>System Login</title>
</head>
<body>
<h2>System Login</h2>

<form action="login.php" method="post">
    <table style="border: 0">
        <tr>
            <td>Username</td>
            <td>
                <input type="text" id="username" name="user_input"/>
            </td>
        </tr>
        <tr>
            <td>Password</td>
            <td>
                <input type="password" id="password" name="password_input"/>
            </td>
        </tr>
        <tr>
            <td>I am a: </td>
            <td>
                <input type="radio" id="student" name="roleSelector" value="STUDENT"/>
                <label for="student">Student</label>
                <input type="radio" id="instructor" name="roleSelector" value="INSTRUCTOR"/>
                <label for="instructor">Instructor</label>
                <input type="radio" id="admin" name="roleSelector" value="ADMIN"/>
                <label for="admin">Administrator</label>
            </td>
        </tr>
        <tr><td></td></tr>
        <tr>
            <td colspan="2" style="align-items: center">
                <input type="submit" value="Logon" id="logonButton" name="log_btn"/>
            </td>
        </tr>
        <tr>
            <td colspan="2" style="align-items: center">
                <input type="submit" value="Forgot Username" id="forgotUsername" name="forgot_user_btn"/>
            </td>
        </tr>
        <tr>
            <td colspan="2" style="align-items: center">
                <input type="submit" value="Forgot Password" id="forgotPassword" name="forgot_pass_btn"/>
            </td>
        </tr>
    </table>
</form>

</body>
</html>
