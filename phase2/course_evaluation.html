<html lang="en">
<head>
    <title>Course Evaluation</title>
</head>
<body>
<h2>Course Evaluation</h2>

<form action="course_evaluation.php" method="post">
    <table style="border: 0">
        <tr>
            <td>Student ID:</td>
            <td><input type="text" id="student_id" name="student_id" required/></td>
        </tr>
        <tr>
            <td>Course ID</td>
            <td>
                <input type="text" id="course_num" name="course_id" required/>
            </td>
        </tr>
        <tr>
            <td>Section ID</td>
            <td>
                <input type="text" id="section_num" name="section_id" required/>
            </td>
        </tr>
        <tr>
            <td>Year</td>
            <td>
                <input type="text" id="year" name="year_id" required/>
            </td>
        </tr>
        <tr>
            <td>Semester</td>
            <td>
                <input type="radio" id="winter" name="semesterSelector" value="Winter"/>
                <label for="winter">Winter</label>
                <input type="radio" id="spring" name="semesterSelector" value="Spring"/>
                <label for="spring">Spring</label>
                <input type="radio" id="summer" name="semesterSelector" value="Summer"/>
                <label for="summer">Summer</label>
                <input type="radio" id="fall" name="semesterSelector" value="Fall"/>
                <label for="fall">Fall</label>
            </td>
        </tr>
        <tr>
            <td>Rate the course from 1 to 5 Stars</td>
            <td>
                <input type="radio" name="rateSelector" value="1" required/> 1
                <input type="radio" name="rateSelector" value="2"/> 2
                <input type="radio" name="rateSelector" value="3"/> 3
                <input type="radio" name="rateSelector" value="4"/> 4
                <input type="radio" name="rateSelector" value="5"/> 5
            </td>
        </tr>
                <tr>
            <td>Comments (optional)</td>
            <td>
                <input type="text" id="comment" name="comments"/>
            </td>
        </tr>
        <tr><td></td></tr>
        <tr>
            <td colspan="2" style="align-items: center">
                <input type="submit" value="Submit and view your grade" id="viewButton"/>
            </td>
        </tr>
    </table>
</form>

</body>
</html>
