<html lang="en">
<head>
    <title>Student Transcript</title>
</head>
<body>
<h2>Student Transcript</h2>

<form action="student_transcript.php" method="post">
    <table style="border: 0">
        <tr>
            <td>Student ID</td>
            <td>
                <input type="text" id="student" name="student_id" required/>
            </td>
        </tr>
        <tr><td></td></tr>
        <tr>
            <td colspan="2" style="align-items: center">
                <input type="submit" value="View Transcript" id="viewButton"/>
            </td>
        </tr>
    </table>
</form>

    <script>
    const params = new URLSearchParams(window.location.search);
    const studentId = params.get('student_id');
    if (studentId) {
        const field = document.getElementById('student');
        field.value = studentId;
        field.readOnly = true; // prevent editing since it came from login
    }
    </script>

</body>
</html>
